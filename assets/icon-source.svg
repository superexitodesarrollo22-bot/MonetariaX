<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Fondo azul marino -->
  <rect width="1024" height="1024" rx="180" fill="#0A2463"/>
  <!-- Círculo decorativo de fondo -->
  <circle cx="800" cy="200" r="350" fill="#1A3A8F" opacity="0.4"/>
  <!-- Símbolo principal: billetes con flecha circular -->
  <!-- Rectángulo billete principal -->
  <rect x="200" y="380" width="500" height="280" rx="40" fill="none" stroke="#00C896" stroke-width="42"/>
  <!-- Símbolo dólar dentro -->
  <text x="450" y="570" font-size="200" font-weight="900" fill="#00C896"
        font-family="Arial,sans-serif" text-anchor="middle">$</text>
  <!-- Flecha circular (arriba derecha) indicando flujo -->
  <path d="M 700 320 A 80 80 0 0 1 820 200" stroke="#F4A261" stroke-width="38"
        fill="none" stroke-linecap="round"/>
  <polygon points="820,200 870,180 840,250" fill="#F4A261"/>
  <!-- Flecha circular (abajo izquierda) -->
  <path d="M 320 700 A 80 80 0 0 1 200 820" stroke="#F4A261" stroke-width="38"
        fill="none" stroke-linecap="round"/>
  <polygon points="200,820 150,840 180,770" fill="#F4A261"/>
</svg>
